version: '3.8'

services:
  db:
    image: postgres:15
    container_name: odoo_db
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    networks:
      - invoice-network

  odoo:
    image: odoo:17
    container_name: odoo_app
    restart: always
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo-web-data:/var/lib/odoo
    networks:
      - invoice-network

  registry_db:
    image: postgres:15
    container_name: invoice_registry_db
    restart: always
    environment:
      POSTGRES_DB: registry
      POSTGRES_USER: registry_user
      POSTGRES_PASSWORD: registry_pass
    ports:
      - "5433:5432"
    volumes:
      - registry_data:/var/lib/postgresql/data
    networks:
      - invoice-network

volumes:
  odoo-db-data:
  odoo-web-data:
  registry_data:

networks:
  invoice-network:
    driver: bridge
